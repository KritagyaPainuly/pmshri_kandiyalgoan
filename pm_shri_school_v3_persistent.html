<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PM SHRI Govt Inter College Kandiyalgoan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0d2240;--navy2:#1a3a6b;--gold:#e8a020;--gold2:#f5c842;--light:#f7f9fc;--white:#fff;--gray:#6b7280;--lgray:#e8ecf2;--red:#c0392b;--green:#1e7a3c;--ff:'DM Sans',sans-serif;--fh:'Playfair Display',serif}
body{font-family:var(--ff);background:var(--light);color:#1a1a2e;overflow-x:hidden}
.nav{position:sticky;top:0;z-index:999;background:var(--navy);box-shadow:0 2px 20px rgba(0,0,0,.3)}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.5rem;gap:1rem}
.nav-logo{display:flex;align-items:center;gap:.65rem;text-decoration:none;flex-shrink:0}
.nav-logo-icon{width:44px;height:44px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:1rem;font-family:var(--fh)}
.nav-name strong{display:block;font-size:.82rem;font-weight:600;color:#fff}
.nav-name span{font-size:.68rem;color:#a0b4cc}
.nav-links{display:flex;gap:0;list-style:none;flex-wrap:wrap}
.nav-links a{display:block;padding:.45rem .8rem;color:#c8d8e8;text-decoration:none;font-size:.78rem;font-weight:500;border-radius:6px;transition:.2s;cursor:pointer}
.nav-links a:hover{color:var(--gold);background:rgba(255,255,255,.07)}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;color:#fff;font-size:1.3rem}
.mobile-menu{display:none;flex-direction:column;background:var(--navy);padding:.75rem 1.5rem;gap:.15rem}
.mobile-menu.open{display:flex}
.mobile-menu a{color:#c8d8e8;text-decoration:none;padding:.5rem .5rem;font-size:.85rem;border-radius:6px;cursor:pointer}
.mobile-menu a:hover{color:var(--gold)}
.hero{min-height:88vh;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1f4e8c 100%);display:flex;align-items:center;position:relative;overflow:hidden;padding:3rem 1.5rem}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(232,160,32,.07) 0%,transparent 60%)}
.hero-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;width:100%}
.hero-badge{display:inline-block;background:rgba(232,160,32,.18);border:1px solid var(--gold);color:var(--gold);font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:.35rem .9rem;border-radius:20px;margin-bottom:1.2rem}
.hero h1{font-family:var(--fh);font-size:2.5rem;color:#fff;line-height:1.25;margin-bottom:1rem}
.hero h1 span{color:var(--gold2)}
.hero p{color:#a0b8d0;font-size:1rem;line-height:1.7;margin-bottom:2rem}
.hero-btns{display:flex;gap:.75rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.7rem 1.6rem;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;text-decoration:none;border:2px solid transparent;transition:.2s;font-family:var(--ff)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;color:#fff;border-color:rgba(255,255,255,.35)}
.btn-outline:hover{background:rgba(255,255,255,.08);border-color:#fff}
.hero-visual{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.stats-bar{background:#fff;border-bottom:1px solid var(--lgray)}
.stats-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.stat-card{text-align:center;padding:1.75rem 1rem;border-right:1px solid var(--lgray)}
.stat-card:last-child{border-right:none}
.stat-icon{font-size:1.8rem;margin-bottom:.6rem}
.stat-num{font-family:var(--fh);font-size:1.9rem;font-weight:700;color:var(--navy);line-height:1}
.stat-label{font-size:.74rem;color:var(--gray);font-weight:500;letter-spacing:.4px;text-transform:uppercase;margin-top:.3rem}
.section{padding:5rem 1.5rem}
.section-alt{background:#fff}
.sec-inner{max-width:1200px;margin:0 auto}
.sec-tag{display:inline-block;color:var(--gold);font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:.6rem}
.sec-title{font-family:var(--fh);font-size:2rem;color:var(--navy);margin-bottom:.75rem;font-weight:700}
.divider{width:56px;height:3px;background:var(--gold);border-radius:2px;margin-bottom:2rem}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:start}
.read-more-btn{color:var(--navy2);font-weight:600;cursor:pointer;font-size:.88rem;text-decoration:underline;background:none;border:none;font-family:var(--ff);padding:0;margin-top:.5rem}
.principal-card{background:var(--navy);border-radius:16px;padding:2rem;color:#fff}
.p-avatar{width:64px;height:64px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:1.4rem;color:var(--navy);font-weight:700;margin-bottom:1rem}
.principal-card h3{font-family:var(--fh);font-size:1.05rem;color:#fff;margin-bottom:.2rem}
.p-role{color:var(--gold);font-size:.74rem;font-weight:600;letter-spacing:.5px;margin-bottom:.9rem}
.principal-card p{font-size:.85rem;color:#a0b8d0;line-height:1.7}
.quote-m{font-size:2.8rem;color:rgba(232,160,32,.3);font-family:var(--fh);line-height:1;margin-bottom:.5rem}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1.15rem;margin-top:2rem}
.staff-card{background:#fff;border-radius:14px;padding:1.4rem 1rem;text-align:center;border:1px solid var(--lgray);transition:.2s}
.staff-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,34,64,.1)}
.staff-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .85rem;font-family:var(--fh);font-size:1.3rem;color:#fff;font-weight:700}
.staff-name{font-weight:600;font-size:.84rem;color:var(--navy);margin-bottom:.2rem}
.staff-sub{font-size:.74rem;color:var(--gold);font-weight:600}
.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.4rem;margin-top:2rem}
.fac-card{background:#fff;border-radius:14px;padding:1.6rem;border:1px solid var(--lgray);transition:.2s}
.fac-card:hover{border-color:var(--gold);box-shadow:0 8px 24px rgba(232,160,32,.1)}
.fac-icon{font-size:2rem;margin-bottom:.9rem}
.fac-card h3{font-family:var(--fh);font-size:1rem;color:var(--navy);margin-bottom:.4rem}
.fac-card p{font-size:.82rem;color:var(--gray);line-height:1.6}
.gallery-section{background:var(--navy)}
.gallery-section .sec-title{color:#fff}
.gallery-section .sec-tag{color:var(--gold2)}
.gallery-section .divider{background:rgba(232,160,32,.5)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:2rem}
.gallery-item{border-radius:12px;overflow:hidden;aspect-ratio:4/3;position:relative;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}
.gallery-item:hover img{transform:scale(1.05)}
.gallery-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8097b0;font-size:.82rem;gap:.5rem}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;padding:.75rem .75rem .5rem;font-size:.78rem;font-weight:500}
.gallery-empty{text-align:center;color:#7a8fa6;padding:3rem;grid-column:1/-1}
.gallery-empty span{font-size:2.5rem;display:block;margin-bottom:.5rem}
.notices-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-top:2rem}
.notice-item{display:flex;gap:.9rem;align-items:flex-start;padding:1.1rem;border-radius:10px;background:var(--light);border-left:4px solid var(--gold)}
.notice-title{font-weight:600;font-size:.88rem;color:var(--navy);margin-bottom:.2rem}
.notice-date{font-size:.73rem;color:var(--gray)}
.tag-n{display:inline-block;padding:.18rem .55rem;border-radius:3px;font-size:.7rem;font-weight:600}
.tag-new{background:#fef3c7;color:#92400e}
.tag-pdf{background:#fee2e2;color:var(--red)}
.dl-section{background:#fff}
.dl-categories{display:flex;gap:.75rem;margin-bottom:2rem;flex-wrap:wrap}
.dl-cat-btn{padding:.45rem 1.1rem;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;border:2px solid var(--lgray);background:#fff;color:var(--gray);transition:.2s;font-family:var(--ff)}
.dl-cat-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1rem}
.dl-card{background:var(--light);border-radius:12px;padding:1.15rem;display:flex;align-items:center;gap:.8rem;border:1px solid var(--lgray);transition:.2s}
.dl-card:hover{border-color:var(--navy2);box-shadow:0 4px 16px rgba(13,34,64,.08)}
.dl-icon-box{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem}
.dl-pdf{background:#fee2e2}.dl-doc{background:#dbeafe}.dl-img{background:#d1fae5}.dl-other{background:#f3e8ff}
.dl-info{flex:1;min-width:0}
.dl-name{font-weight:600;font-size:.82rem;color:var(--navy);margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-meta{font-size:.72rem;color:var(--gray)}
.dl-btn{width:32px;height:32px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;cursor:pointer;border:none;flex-shrink:0;transition:.2s}
.dl-btn:hover{background:var(--navy2)}
.dl-empty{text-align:center;color:var(--gray);padding:2.5rem;grid-column:1/-1;font-size:.9rem}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;margin-top:2rem}
.contact-card{background:var(--navy);border-radius:16px;padding:2rem;color:#fff}
.contact-card h3{font-family:var(--fh);font-size:1.2rem;color:#fff;margin-bottom:1.4rem}
.ci{display:flex;gap:.85rem;align-items:flex-start;margin-bottom:1.15rem}
.ci-icon{width:38px;height:38px;background:rgba(232,160,32,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.ci-text{font-size:.85rem;color:#a0b8d0;line-height:1.5}
.ci-text strong{display:block;color:#fff;font-size:.88rem;margin-bottom:.1rem}
.map-box{border-radius:16px;background:var(--light);border:1px solid var(--lgray);min-height:280px;display:flex;align-items:center;justify-content:center}
.map-ph{text-align:center;color:var(--gray)}
.map-ph .mi{font-size:2.8rem;margin-bottom:.6rem}
.footer{background:#060f1c;padding:3rem 1.5rem 1.5rem;color:#7a8fa6}
.foot-inner{max-width:1200px;margin:0 auto}
.foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:2rem;margin-bottom:2.5rem}
.foot-brand p{font-size:.83rem;line-height:1.7;margin-top:.6rem}
.foot-logo{display:flex;align-items:center;gap:.65rem;margin-bottom:.6rem}
.foot-logo-ic{width:38px;height:38px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:.85rem}
.foot-logo-n{font-size:.83rem;color:#fff;font-weight:600;line-height:1.3}
.footer h4{color:#fff;font-size:.84rem;font-weight:600;margin-bottom:.9rem;letter-spacing:.4px}
.footer ul{list-style:none}
.footer ul li{margin-bottom:.45rem}
.footer ul a{color:#7a8fa6;text-decoration:none;font-size:.8rem;transition:.2s;cursor:pointer}
.footer ul a:hover{color:var(--gold)}
.foot-news input{width:100%;padding:.55rem .9rem;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);border-radius:7px;color:#fff;font-size:.82rem;margin-bottom:.45rem;font-family:var(--ff);outline:none}
.foot-news input::placeholder{color:#4a5a6a}
.foot-news button{width:100%;padding:.55rem;background:var(--gold);color:var(--navy);border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--ff)}
.foot-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:1.1rem;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;flex-wrap:wrap;gap:.5rem}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:3000;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;width:40px;height:40px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.admin-bar{background:#7f1d1d;color:#fff;padding:.4rem 1.5rem;font-size:.76rem;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.abtn{background:rgba(255,255,255,.2);color:#fff;border:none;padding:.25rem .75rem;border-radius:4px;cursor:pointer;font-size:.73rem;font-family:var(--ff)}
.login-wrap{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;max-width:400px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.l-logo{text-align:center;margin-bottom:2rem}
.l-circle{width:70px;height:70px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .7rem;font-family:var(--fh);font-size:1.5rem;color:#fff}
.l-logo h2{font-family:var(--fh);color:var(--navy);font-size:1.35rem}
.l-logo p{color:var(--gray);font-size:.8rem;margin-top:.2rem}
.fg{margin-bottom:1.2rem}
.fg label{display:block;font-size:.8rem;font-weight:600;color:var(--navy);margin-bottom:.35rem}
.fg input,.fg select,.fg textarea{width:100%;padding:.65rem 1rem;border:1.5px solid var(--lgray);border-radius:8px;font-size:.86rem;font-family:var(--ff);color:#1a1a2e;transition:.2s;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy2)}
.fg textarea{resize:vertical;min-height:80px}
.btn-navy{background:var(--navy);color:#fff;border:none;width:100%;padding:.82rem;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:var(--ff);transition:.2s}
.btn-navy:hover{background:var(--navy2)}
.err-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:.7rem 1rem;font-size:.8rem;color:var(--red);margin-bottom:1rem}
.dash-wrap{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.sidebar{background:var(--navy);position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:1.2rem 1.1rem 1rem;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo strong{color:#fff;font-size:.88rem;display:block}
.sb-logo span{color:#7a8fa6;font-size:.7rem}
.sb-nav{list-style:none;padding:.5rem 0}
.sb-nav li button{display:flex;align-items:center;gap:.65rem;padding:.65rem 1.1rem;color:#8097b0;font-size:.82rem;width:100%;background:none;border:none;cursor:pointer;font-family:var(--ff);text-align:left;transition:.15s;border-left:3px solid transparent}
.sb-nav li button:hover{color:#fff;background:rgba(255,255,255,.06)}
.sb-nav li button.active{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--gold)}
.sb-section{padding:.5rem 1.1rem .2rem;font-size:.64rem;color:#4a5a6a;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:.5rem}
.dash-content{background:var(--light);padding:2rem;overflow-y:auto}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.dh h1{font-family:var(--fh);font-size:1.5rem;color:var(--navy)}
.dh p{font-size:.8rem;color:var(--gray);margin-top:.1rem}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1.1rem;margin-bottom:1.75rem}
.ds{background:#fff;border-radius:12px;padding:1.15rem;border:1px solid var(--lgray)}
.ds-ic{font-size:1.4rem;margin-bottom:.4rem}
.ds-n{font-family:var(--fh);font-size:1.8rem;font-weight:700;color:var(--navy)}
.ds-l{font-size:.74rem;color:var(--gray);margin-top:.15rem}
.tw{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--lgray);margin-bottom:1.5rem}
.tw-head{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 1.25rem;border-bottom:1px solid var(--lgray)}
.tw-head h2{font-family:var(--fh);font-size:1.05rem;color:var(--navy)}
.at{width:100%;border-collapse:collapse;font-size:.82rem}
.at th{background:var(--navy);color:#fff;padding:.65rem 1rem;text-align:left;font-weight:600;font-size:.76rem;letter-spacing:.4px}
.at td{padding:.7rem 1rem;border-bottom:1px solid var(--lgray);vertical-align:middle}
.at tr:hover td{background:rgba(13,34,64,.02)}
.at tr:last-child td{border-bottom:none}
.bsm{padding:.38rem .85rem;font-size:.78rem;border-radius:6px;cursor:pointer;font-weight:600;font-family:var(--ff);border:none;transition:.15s}
.b-add{background:var(--navy);color:#fff}.b-add:hover{background:var(--navy2)}
.b-edit{background:#dbeafe;color:#1e40af}.b-edit:hover{background:#bfdbfe}
.b-del{background:#fee2e2;color:var(--red)}.b-del:hover{background:#fecaca}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000;padding:1rem}
.mb{background:#fff;border-radius:16px;padding:2rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.mb h3{font-family:var(--fh);font-size:1.15rem;color:var(--navy);margin-bottom:1.4rem}
.ma{display:flex;gap:.7rem;justify-content:flex-end;margin-top:1.4rem}
.upload-zone{border:2px dashed var(--lgray);border-radius:12px;padding:1.75rem;text-align:center;cursor:pointer;transition:.2s;background:var(--light)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--navy2);background:#f0f4ff}
.upload-zone p{color:var(--gray);font-size:.82rem;margin-top:.4rem}
.upload-zone .uz-icon{font-size:2rem;margin-bottom:.4rem}
.file-preview{background:var(--light);border-radius:8px;padding:.65rem 1rem;display:flex;align-items:center;gap:.75rem;margin-top:.65rem;border:1px solid var(--lgray)}
.fp-icon{font-size:1.4rem}
.fp-name{font-size:.82rem;font-weight:600;color:var(--navy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-size{font-size:.72rem;color:var(--gray);white-space:nowrap}
.gal-admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem;margin-top:1rem}
.gal-admin-item{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:4/3;border:1px solid var(--lgray)}
.gal-admin-item img{width:100%;height:100%;object-fit:cover}
.gal-admin-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;opacity:0;transition:.2s}
.gal-admin-item:hover .gal-admin-overlay{opacity:1}
.gal-admin-overlay span{font-size:.75rem;color:#fff;font-weight:600;text-align:center;padding:0 .5rem}
.success-toast{position:fixed;bottom:2rem;right:2rem;background:var(--green);color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.84rem;font-weight:600;z-index:4000;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slidein .3s ease}
.saving-toast{position:fixed;bottom:2rem;right:2rem;background:var(--navy);color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.84rem;font-weight:600;z-index:4000;box-shadow:0 8px 24px rgba(0,0,0,.2)}
@keyframes slidein{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--navy);color:#fff;gap:1rem}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

// ── STORAGE HELPERS ──────────────────────────────────
const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:5500/api' : `${window.location.origin}/api`;
const KEYS={teachers:'teachers',notices:'notices',downloads:'downloads',gallery:'gallery',content:'content'};

async function loadAll(){
  const results={};
  const pairs=[
    ['teachers',KEYS.teachers,DEFAULT_TEACHERS],
    ['notices',KEYS.notices,DEFAULT_NOTICES],
    ['downloads',KEYS.downloads,DEFAULT_DOWNLOADS],
    ['gallery',KEYS.gallery,DEFAULT_GALLERY],
    ['content',KEYS.content,DEFAULT_CONTENT],
  ];
  for(const [key,endpoint,def] of pairs){
    try{
      const response = await fetch(`${API_BASE}/${endpoint}`);
      if(response.ok){
        results[key] = await response.json();
      } else {
        results[key] = def;
      }
    }catch{
      results[key]=def;
    }
  }
  return results;
}

async function saveKey(endpoint,data){
  try{
    const response = await fetch(`${API_BASE}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if(!response.ok) throw new Error('Save failed');
  }
  catch(e){console.error('Storage error',e);}
}

// ── FILE UTILS ───────────────────────────────────────
function readFile(file){
  return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
}
function formatSize(bytes){
  if(!bytes)return'—';
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return Math.round(bytes/1024)+' KB';
  return(bytes/1048576).toFixed(1)+' MB';
}
function getExt(type=''){
  const t=type.toUpperCase();
  if(t.includes('PDF'))return'PDF';
  if(t.includes('DOC'))return'DOC';
  if(t.includes('IMAGE')||t.includes('PNG')||t.includes('JPG')||t.includes('JPEG'))return'IMG';
  return'FILE';
}
function getFileIcon(type=''){
  const t=type.toUpperCase();
  if(t==='PDF')return{icon:'📄',cls:'dl-pdf'};
  if(t==='DOC'||t==='DOCX')return{icon:'📝',cls:'dl-doc'};
  if(t==='IMG'||t==='IMAGE')return{icon:'🖼️',cls:'dl-img'};
  return{icon:'📎',cls:'dl-other'};
}

// ── TOAST ────────────────────────────────────────────
function Toast({msg,saving,onDone}){
  useEffect(()=>{if(!saving){const t=setTimeout(onDone,2500);return()=>clearTimeout(t);}},[saving]);
  return h('div',{className:saving?'saving-toast':'success-toast'},saving?'💾 Saving…':msg);
}

// ── UPLOAD ZONE ──────────────────────────────────────
function UploadZone({accept,onFile,file,label}){
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  const handle=async files=>{
    if(!files||!files[0])return;
    const f=files[0];
    const url=await readFile(f);
    onFile({name:f.name,size:formatSize(f.size),type:f.type,dataUrl:url});
  };
  return h('div',null,
    h('div',{className:'upload-zone'+(drag?' drag':''),onClick:()=>ref.current.click(),
      onDragOver:e=>{e.preventDefault();setDrag(true)},
      onDragLeave:()=>setDrag(false),
      onDrop:e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files)}},
      h('input',{ref,type:'file',accept,style:{display:'none'},onChange:e=>handle(e.target.files)}),
      h('div',{className:'uz-icon'},'📂'),
      h('p',null,label||'Click or drag & drop to upload'),
      h('p',{style:{fontSize:'.7rem',color:'#9ca3af',marginTop:'.2rem'}},accept||'Any file')
    ),
    file&&h('div',{className:'file-preview'},
      h('span',{className:'fp-icon'},file.type&&file.type.startsWith('image')?'🖼️':'📄'),
      h('span',{className:'fp-name'},file.name),
      h('span',{className:'fp-size'},file.size)
    )
  );
}

  const openAdd=()=>{setForm({name:'',subject:'',initials:'',color:'#1a3a6b',imgUrl:null});setImgFile(null);setModal('add');};
  const openEdit=t=>{setForm({...t});setImgFile(null);setModal('edit');};
  const save=()=>{
    if(!form.name||!form.subject){alert('Name and subject are required.');return;}
    const ini=form.initials||form.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const entry={...form,initials:ini,imgUrl:imgFile?imgFile.dataUrl:form.imgUrl};
    let next;
    if(modal==='add')next=[...teachers,{...entry,id:Date.now()}];
    else next=teachers.map(t=>t.id===form.id?{...entry,id:form.id}:t);
    onUpdate(next);setModal(null);toast(modal==='add'?'Teacher added & saved!':'Teacher updated & saved!');
  };
  const del=id=>{onUpdate(teachers.filter(t=>t.id!==id));toast('Teacher deleted.');};
  return h('div',null,

function DownloadsTab({downloads,onUpdate,toast}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',category:'Certificates',fileData:null});
  const openAdd=()=>{setForm({name:'',category:'Certificates',fileData:null});setModal('add');};
  const openEdit=d=>{setForm({name:d.name,category:d.category||'Certificates',fileData:null,_id:d.id});setModal('edit');};
  const save=()=>{
    if(!form.name){alert('Please enter a file name.');return;}
    if(modal==='add'&&!form.fileData){alert('Please select a file to upload.');return;}
    let next;
    if(modal==='add'){
      const fd=form.fileData;
      const ext=fd?getExt(fd.type):'FILE';
      next=[...downloads,{id:Date.now(),name:form.name,type:ext,size:fd?fd.size:'—',category:form.category,dataUrl:fd?fd.dataUrl:null}];
    } else {
      next=downloads.map(d=>{
        if(d.id!==form._id)return d;
        const fd=form.fileData;
        return{...d,name:form.name,category:form.category,...(fd?{type:getExt(fd.type),size:fd.size,dataUrl:fd.dataUrl}:{})};
      });
    }
    onUpdate(next);setModal(null);toast(modal==='add'?'File uploaded & saved!':'File updated & saved!');
  };
  const del=id=>{onUpdate(downloads.filter(d=>d.id!==id));toast('File deleted.');};
  return h('div',null,
    h('div',{className:'tw'},
      h('div',{className:'tw-head'},h('h2',null,'Manage Downloads'),h('button',{className:'bsm b-add',onClick:openAdd},'+ Upload File')),
      downloads.length===0?h('p',{style:{padding:'1.5rem',color:'var(--gray)',fontSize:'.88rem'}},'No files yet.'):
      h('table',{className:'at'},
        h('thead',null,h('tr',null,h('th',null,'File'),h('th',null,'Type'),h('th',null,'Size'),h('th',null,'Category'),h('th',null,'Status'),h('th',null,'Actions'))),
        h('tbody',null,downloads.map(d=>{
          const {icon}=getFileIcon(d.type);
          return h('tr',{key:d.id},
            h('td',null,icon+' '+d.name),
            h('td',null,h('span',{className:'tag-n tag-pdf'},d.type||'FILE')),
            h('td',null,d.size||'—'),
            h('td',null,d.category||'—'),
            h('td',null,d.dataUrl?h('span',{style:{color:'var(--green)',fontSize:'.75rem',fontWeight:600}},'✅ Ready'):h('span',{style:{color:'#92400e',fontSize:'.75rem',fontWeight:600}},'⏳ Pending')),
            h('td',null,h('button',{className:'bsm b-edit',style:{marginRight:4},onClick:()=>openEdit(d)},'Edit'),h('button',{className:'bsm b-del',onClick:()=>del(d.id)},'Delete'))
          );
        }))
      )
    ),
    modal&&h(Modal,{title:modal==='add'?'Upload New File':'Edit File',onClose:()=>setModal(null)},
      h('div',{className:'fg'},h('label',null,'Display Name *'),h('input',{value:form.name,onChange:v=>setForm(p=>({...p,name:v.target.value})),placeholder:'e.g. Fire Safety Certificate'})),
      h('div',{className:'fg'},h('label',null,'Category'),h('select',{value:form.category,onChange:v=>setForm(p=>({...p,category:v.target.value}))},['Certificates','Documents','Forms','Reports','Other'].map(c=>h('option',{key:c},c)))),
      h('div',{className:'fg'},h('label',null,modal==='edit'?'Replace File (optional)':'File *'),h(UploadZone,{accept:'.pdf,.doc,.docx,.png,.jpg,.jpeg',file:form.fileData,onFile:f=>setForm(p=>({...p,fileData:f})),label:'Click or drag PDF/DOC/Image here'})),
      h('div',{className:'ma'},h('button',{className:'bsm b-del',onClick:()=>setModal(null)},'Cancel'),h('button',{className:'bsm b-add',onClick:save},'Save'))
    )
  );
}

function NoticesTab({notices,onUpdate,toast}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({title:'',date:'',isNew:false});
  const openAdd=()=>{setForm({title:'',date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}),isNew:true});setModal('add');};
  const openEdit=n=>{setForm({...n});setModal('edit');};
  const save=()=>{
    if(!form.title){alert('Title is required.');return;}
    let next;
    if(modal==='add')next=[{...form,id:Date.now()},...notices];
    else next=notices.map(n=>n.id===form.id?form:n);
    onUpdate(next);setModal(null);toast(modal==='add'?'Notice added & saved!':'Notice updated!');
  };
  const del=id=>{onUpdate(notices.filter(n=>n.id!==id));toast('Notice deleted.');};
  return h('div',null,
    h('div',{className:'tw'},
      h('div',{className:'tw-head'},h('h2',null,'Manage Notices'),h('button',{className:'bsm b-add',onClick:openAdd},'+ Add Notice')),
      notices.length===0?h('p',{style:{padding:'1.5rem',color:'var(--gray)',fontSize:'.88rem'}},'No notices yet.'):
      h('table',{className:'at'},
        h('thead',null,h('tr',null,h('th',null,'Title'),h('th',null,'Date'),h('th',null,'Tag'),h('th',null,'Actions'))),
        h('tbody',null,notices.map(n=>h('tr',{key:n.id},
          h('td',null,n.title),h('td',null,n.date),
          h('td',null,n.isNew&&h('span',{className:'tag-n tag-new'},'NEW')),
          h('td',null,h('button',{className:'bsm b-edit',style:{marginRight:4},onClick:()=>openEdit(n)},'Edit'),h('button',{className:'bsm b-del',onClick:()=>del(n.id)},'Delete'))
        )))
      )
    ),
    modal&&h(Modal,{title:modal==='add'?'Add Notice':'Edit Notice',onClose:()=>setModal(null)},
      h('div',{className:'fg'},h('label',null,'Notice Title *'),h('input',{value:form.title,onChange:v=>setForm(p=>({...p,title:v.target.value})),placeholder:'e.g. Annual Sports Day 2024'})),
      h('div',{className:'fg'},h('label',null,'Date'),h('input',{value:form.date,onChange:v=>setForm(p=>({...p,date:v.target.value}))})),
      h('div',{className:'fg',style:{display:'flex',alignItems:'center',gap:'.7rem'}},h('input',{type:'checkbox',checked:form.isNew,onChange:v=>setForm(p=>({...p,isNew:v.target.checked})),style:{width:16,height:16}}),h('label',null,'Mark as NEW')),
      h('div',{className:'ma'},h('button',{className:'bsm b-del',onClick:()=>setModal(null)},'Cancel'),h('button',{className:'bsm b-add',onClick:save},'Save'))
    )
  );
}

// ── DASHBOARD ────────────────────────────────────────
function Dashboard({data,onUpdate,onLogout}){
  const [tab,setTab]=useState('overview');
  const [toast,setToast]=useState('');
  const [saving,setSaving]=useState(false);
  const showToast=msg=>setToast(msg);

  const upd=(key,endpoint)=>async(val)=>{
    setSaving(true);setToast('');
    onUpdate(key,val);
    await saveKey(endpoint,val);
    setSaving(false);
  };

  const sideItems=[
    {id:'overview',icon:'🏠',label:'Overview'},
    {sec:'Manage'},
    {id:'teachers',icon:'👨‍🏫',label:'Teachers'},
    {id:'gallery',icon:'🖼️',label:'Gallery'},
    {id:'downloads',icon:'📁',label:'Downloads'},
    {id:'notices',icon:'📢',label:'Notices'},
    {sec:'Settings'},
    {id:'content',icon:'✏️',label:'Content & Info'},
  ];

  const renderTab=()=>{
    if(tab==='teachers')return h(TeachersTab,{teachers:data.teachers,onUpdate:upd('teachers',KEYS.teachers),toast:showToast});
    if(tab==='gallery')return h(GalleryTab,{gallery:data.gallery,onUpdate:upd('gallery',KEYS.gallery),toast:showToast});
    if(tab==='downloads')return h(DownloadsTab,{downloads:data.downloads,onUpdate:upd('downloads',KEYS.downloads),toast:showToast});
    if(tab==='notices')return h(NoticesTab,{notices:data.notices,onUpdate:upd('notices',KEYS.notices),toast:showToast});
    if(tab==='content')return h(ContentTab,{content:data.content,onUpdate:async v=>{onUpdate('content',v);await saveKey(KEYS.content,v);showToast('Content saved!');},toast:showToast});
    return h('div',null,
      h('div',{className:'dash-stats'},
        [{icon:'👨‍🏫',num:data.teachers.length,label:'Teachers'},{icon:'🖼️',num:data.gallery.length,label:'Gallery Photos'},{icon:'📁',num:data.downloads.length,label:'Downloads'},{icon:'📢',num:data.notices.length,label:'Notices'}]
        .map(s=>h('div',{key:s.label,className:'ds'},h('div',{className:'ds-ic'},s.icon),h('div',{className:'ds-n'},s.num),h('div',{className:'ds-l'},s.label)))
      ),
      h('div',{className:'tw',style:{padding:'1.5rem'}},
        h('h2',{style:{fontFamily:'var(--fh)',fontSize:'1.05rem',color:'var(--navy)',marginBottom:'.9rem'}},'Quick Actions'),
        h('div',{style:{display:'flex',gap:'.65rem',flexWrap:'wrap'}},
          [{id:'teachers',label:'👨‍🏫 Manage Teachers'},{id:'gallery',label:'🖼️ Upload Photos'},{id:'downloads',label:'📁 Upload Files'},{id:'notices',label:'📢 Add Notice'},{id:'content',label:'✏️ Edit Content'}]
          .map(a=>h('button',{key:a.id,className:'bsm b-add',style:{padding:'.55rem 1.1rem'},onClick:()=>setTab(a.id)},a.label))
        )
      ),
      h('div',{className:'tw',style:{padding:'1.5rem',marginTop:0}},
        h('p',{style:{fontSize:'.82rem',color:'var(--gray)',display:'flex',alignItems:'center',gap:'.5rem'}},'💾 All changes are automatically saved to persistent storage and will remain after page refresh.')
      )
    );
  };

  return h('div',{className:'dash-wrap'},
    h('div',{className:'sidebar'},
      h('div',{className:'sb-logo'},h('strong',null,'Admin Panel'),h('span',null,'PM SHRI Kandiyalgoan')),
      h('ul',{className:'sb-nav'},
        sideItems.map((s,i)=>s.sec?h('li',{key:'s'+i,className:'sb-section'},s.sec):h('li',{key:s.id},h('button',{className:tab===s.id?'active':'',onClick:()=>setTab(s.id)},s.icon,' ',s.label))),
        h('li',{style:{marginTop:'1rem',borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:'.5rem'}},h('button',{onClick:onLogout,style:{color:'#f87171'}},'🚪 Logout'))
      )
    ),
    h('div',{className:'dash-content'},
      h('div',{className:'dh'},h('div',null,h('h1',null,sideItems.find(s=>s.id===tab)?.label||'Dashboard'),h('p',null,'PM SHRI Govt Inter College Kandiyalgoan'))),
      renderTab(),
      (toast||saving)&&h(Toast,{msg:toast,saving,onDone:()=>setToast('')})
    )
  );
}

// ── LOGIN ────────────────────────────────────────────
function Login({onLogin,onBack}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const submit=()=>{
    if(email==='admin@school.in'&&pass==='admin123')onLogin();
    else setErr('Invalid credentials. Use admin@school.in / admin123');
  };
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-box'},
      h('div',{className:'l-logo'},h('div',{className:'l-circle'},'PM'),h('h2',null,'Admin Login'),h('p',null,'PM SHRI Govt Inter College')),
      err&&h('div',{className:'err-box'},err),
      h('div',{className:'fg'},h('label',null,'Email'),h('input',{type:'email',value:email,onChange:v=>setEmail(v.target.value),placeholder:'admin@school.in'})),
      h('div',{className:'fg'},h('label',null,'Password'),h('input',{type:'password',value:pass,onChange:v=>setPass(v.target.value),placeholder:'••••••••',onKeyDown:k=>k.key==='Enter'&&submit()})),
      h('button',{className:'btn-navy',onClick:submit},'Login to Dashboard'),
      h('button',{style:{marginTop:'1rem',width:'100%',background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:'.82rem',fontFamily:'var(--ff)'},onClick:onBack},'← Back to Website')
    )
  );
}

// ── LOADING ──────────────────────────────────────────
function Loading(){
  return h('div',{className:'loading-screen'},
    h('div',{className:'loading-spinner'}),
    h('p',{style:{color:'#a0b8d0',fontSize:'.9rem'}},'Loading saved data…')
  );

// ── ROOT ─────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('website');
  const [ready,setReady]=useState(false);
  const [data,setData]=useState({teachers:[],notices:[],downloads:[],gallery:[],content:DEFAULT_CONTENT});

  // Load all data from persistent storage on mount
  useEffect(()=>{
    loadAll().then(d=>{setData(d);setReady(true);});
  },[]);

  const updateData=(key,val)=>setData(p=>({...p,[key]:val}));

  if(!ready)return h(Loading);
  if(page==='login')return h(Login,{onLogin:()=>setPage('dashboard'),onBack:()=>setPage('website')});
  if(page==='dashboard')return h(Dashboard,{data,onUpdate:updateData,onLogout:()=>setPage('website')});

  return h('div',null,
    h('div',{className:'admin-bar'},
      h('span',null,'💾 Data is saved persistently — survives page refresh'),
      h('button',{className:'abtn',onClick:()=>setPage('login')},'Open Admin Panel →')
    ),
    h(NavBar,{onAdminClick:()=>setPage('login')}),
    h(Hero),
    // Stats bar
    h('div',{className:'stats-bar'},
      h('div',{className:'stats-inner'},
        [{icon:'🎓',num:'6–12',label:'Classes (CBSE)'},{icon:'👨‍🏫',num:data.teachers.length||'15+',label:'Experienced Staff'},{icon:'👨‍🎓',num:'350+',label:'Students'},{icon:'📍',num:'Kandiyalgoan',label:'Champawat, Uttarakhand'}]
        .map(s=>h('div',{key:s.label,className:'stat-card'},h('div',{className:'stat-icon'},s.icon),h('div',{className:'stat-num'},s.num),h('div',{className:'stat-label'},s.label)))
      )
    ),
    h(AboutSection,{data:data.content}),
    h(StaffSection,{teachers:data.teachers}),
    h(FacilitiesSection),
    h(GallerySection,{gallery:data.gallery}),
    h(NoticesSection,{notices:data.notices}),
    h(DownloadsSection,{downloads:data.downloads}),
    h(ContactSection,{data:data.content}),
    h(FooterSection)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
